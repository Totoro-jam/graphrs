name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      canary:
        description: 'Publish as canary (0.0.0-canary.<sha>)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write
  id-token: write

jobs:
  build-wasm:
    name: Build WASM
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: Totoro-jam/rust-igraph
          path: rust-igraph

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        run: |
          cd rust-igraph
          wasm-pack build crates/igraph-wasm --target web --out-dir pkg --release

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get install -y binaryen

      - name: Optimize WASM
        run: wasm-opt -O3 rust-igraph/crates/igraph-wasm/pkg/igraph_wasm_bg.wasm -o rust-igraph/crates/igraph-wasm/pkg/igraph_wasm_bg.wasm

      - uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg
          path: rust-igraph/crates/igraph-wasm/pkg/
          retention-days: 1

  publish:
    name: Publish to npm
    needs: build-wasm
    if: always() && (needs.build-wasm.result == 'success' || needs.build-wasm.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        if: needs.build-wasm.result == 'success'
        with:
          name: wasm-pkg
          path: wasm-pkg

      - name: Copy WASM artifacts
        if: needs.build-wasm.result == 'success'
        run: |
          cp wasm-pkg/igraph_wasm_bg.wasm packages/core/wasm/
          cp wasm-pkg/igraph_wasm.js packages/core/wasm/
          cp wasm-pkg/igraph_wasm.d.ts packages/core/wasm/ 2>/dev/null || true
          cp wasm-pkg/igraph_wasm_bg.wasm.d.ts packages/core/wasm/ 2>/dev/null || true

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

      - name: Run tests
        if: github.event_name == 'push'
        run: pnpm turbo test:ci

      - name: Set canary versions
        if: github.event_name == 'workflow_dispatch'
        run: |
          SHA=$(git rev-parse --short HEAD)
          for pkg in packages/*/package.json; do
            IS_PRIVATE=$(node -e "const p=require('./$pkg'); console.log(p.private||false)")
            if [ "$IS_PRIVATE" = "true" ]; then continue; fi
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg','utf8'));
              p.version = '0.0.0-canary.' + '$SHA';
              fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
            "
          done

      - name: Publish release
        if: github.event_name == 'push'
        run: |
          for pkg in packages/*/; do
            IS_PRIVATE=$(node -e "const p=require('./${pkg}package.json'); console.log(p.private||false)")
            if [ "$IS_PRIVATE" = "true" ]; then
              echo "Skipping private $(basename $pkg)"
              continue
            fi
            echo "Publishing $(basename $pkg)..."
            cd "$pkg"
            npm publish --access public --provenance
            cd "$GITHUB_WORKSPACE"
          done

      - name: Publish canary
        if: github.event_name == 'workflow_dispatch'
        run: |
          for pkg in packages/*/; do
            IS_PRIVATE=$(node -e "const p=require('./${pkg}package.json'); console.log(p.private||false)")
            if [ "$IS_PRIVATE" = "true" ]; then
              echo "Skipping private $(basename $pkg)"
              continue
            fi
            echo "Publishing $(basename $pkg)..."
            cd "$pkg"
            npm publish --access public --tag canary --provenance
            cd "$GITHUB_WORKSPACE"
          done

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
