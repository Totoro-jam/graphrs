name: Canary Publish

on:
  workflow_dispatch:
    inputs:
      skip-wasm:
        description: 'Skip WASM build (use stubs only)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: read
  id-token: write

jobs:
  canary:
    name: Publish Canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

      - name: Set canary versions
        run: |
          SHA=$(git rev-parse --short HEAD)
          for pkg in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg','utf8'));
              p.version = '0.0.0-canary.' + '$SHA';
              fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
            "
          done

      - name: Publish canary (Trusted Publishing / OIDC)
        run: pnpm -r publish --access public --tag canary --no-git-checks --provenance
